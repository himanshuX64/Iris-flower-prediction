<!DOCTYPE html>
<html>
<head>
    <title>Iris ML App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2 class="text-center mb-4">Iris Flower Classification</h2>

    <!-- Add Iris Data -->
    <div class="card p-3 mb-4">
        <h4>Add Iris Data</h4>
        <form action="/add" method="post">
            <input type="number" step="any" name="sepal_length" placeholder="Sepal Length" class="form-control mb-2" required>
            <input type="number" step="any" name="sepal_width" placeholder="Sepal Width" class="form-control mb-2" required>
            <input type="number" step="any" name="petal_length" placeholder="Petal Length" class="form-control mb-2" required>
            <input type="number" step="any" name="petal_width" placeholder="Petal Width" class="form-control mb-2" required>
            <select name="variety" class="form-control mb-2" required>
                <option value="">Select Variety</option>
                <option value="Setosa">Setosa</option>
                <option value="Versicolor">Versicolor</option>
                <option value="Virginica">Virginica</option>
            </select>
            <button class="btn btn-primary">Add</button>
        </form>
    </div>

    <!-- Prediction -->
    <div class="card p-3 mb-4">
        <h4>Predict Result</h4>
        <form action="/predict" method="post">
            <input type="number" step="any" name="sepal_length" placeholder="Sepal Length" class="form-control mb-2" required>
            <input type="number" step="any" name="sepal_width" placeholder="Sepal Width" class="form-control mb-2" required>
            <input type="number" step="any" name="petal_length" placeholder="Petal Length" class="form-control mb-2" required>
            <input type="number" step="any" name="petal_width" placeholder="Petal Width" class="form-control mb-2" required>
            <button class="btn btn-success">Predict</button>
        </form>

        {% if prediction %}
            <div class="alert alert-info mt-3">
                Prediction: <strong>{{ prediction }}</strong>
            </div>
        {% endif %}
    </div>

    <!-- Iris Data Table -->
    <table class="table table-bordered table-striped">
        <tr>
            <th>ID</th>
            <th>Sepal Length</th>
            <th>Sepal Width</th>
            <th>Petal Length</th>
            <th>Petal Width</th>
            <th>Variety</th>
            <th>Action</th>
        </tr>

        {% for s in iris_data %}
        <tr>
            <td>{{ s[0] }}</td>
            <td>{{ s[1] }}</td>
            <td>{{ s[2] }}</td>
            <td>{{ s[3] }}</td>
            <td>{{ s[4] }}</td>
            <td>{{ s[5] }}</td>
            <td>
                <a href="/delete/{{ s[0] }}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
